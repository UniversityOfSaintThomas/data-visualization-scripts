version: 0.2

# This CodeBuild project is run manually, on demand.
# Its only job is to execute the Python entry point (main.py), which will read
# the campaign JSON file from the repository and post it to Cascade CMS.
#
# The pipeline's CodeBuild project is configured with BuildSpec = "buildspec.yml"
# (resolved relative to the source root), so this file and main.py live at the
# repository root.
#
# BUILD ENVIRONMENT VARIABLES are supplied by the Pipeline/CodeBuild project.
# You can view them in the AWS Console (CodeBuild > Projects > [build run] >
# Environment Variables) or by running `printenv` during a build.

# CodeBuild fetches and decrypts this SSM SecureString and injects it into the
# CASCADE_API_KEY environment variable BEFORE any phase runs (the value is
# masked in build logs). main.py / utils/services.py read os.environ first, so
# no code change is needed. The parameter must already exist (create it once
# with `aws ssm put-parameter --type SecureString ...`); env.parameter-store
# resolves at startup and cannot bootstrap a missing parameter.
#
# NOTE: replace the parameter name below with your real SSM path. It must be a
# literal name here (it is resolved before shell variables are available, so
# ${PARAM_STORE_HIERARCHY} interpolation does NOT work in this block).
env:
  parameter-store:
    CASCADE_API_KEY: /cascade/give/CascadeApiKey

phases:
  install:
    runtime-versions:
      python: latest
    commands:
      # Build environment information for debugging purposes
      - python3 --version

  build:
    commands:
      # Run the on-demand job. The script uses only the Python standard
      # library, so there is nothing to pip install.
      # The script's exit code determines whether the build passes or fails.
      - python3 main.py
